<script src="../js/app.js"></script>
<script>
(function () {
  var bt = window.BoringTools;
  var el = document.getElementById("cat-grid");
  var html = "";
  for (var i = 0; i < bt.categories.length; i++) {
    var c = bt.categories[i];
    html += '<li><a class="cat-card" href="' + bt.catUrl(c.slug) + '"><span class="t">' + c.title + '</span><span class="d">' + c.description + '</span></a></li>';
  }
  el.innerHTML = html;
})();
</script>
